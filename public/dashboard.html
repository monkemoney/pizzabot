<!doctype html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jasell — ניהול</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
:root {
  --primary:      #5e17eb;
  --primary-dark: #4a0fd4;
  --primary-soft: #ede8fd;
  --accent:       #ff66c4;
  --accent-soft:  #fff0f9;
  --bg:           #eeede9;
  --white:        #ffffff;
  --text:         #1a1028;
  --text-muted:   #7a6f8a;
  --border:       #e8e3f2;
  --radius:       18px;
  --sidebar-w:    256px;
}
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Sidebar ── */
#sidebar {
  position: fixed; inset-y: 0; right: 0;
  width: var(--sidebar-w);
  background: var(--primary);
  display: flex; flex-direction: column;
  z-index: 30;
}
.sidebar-logo {
  padding: 28px 22px 22px;
  border-bottom: 1px solid rgba(255,255,255,.1);
}
.sidebar-logo img { height: 44px; }
.sidebar-logo .logo-fallback {
  font-size: 1.7rem; font-weight: 800;
  color: #fff; letter-spacing: -1px; display: none;
}
.sidebar-logo .logo-sub {
  font-size: .7rem; color: rgba(255,255,255,.5);
  margin-top: 4px; font-weight: 500;
}
.sidebar-user {
  padding: 16px 22px;
  border-bottom: 1px solid rgba(255,255,255,.1);
  font-size: .75rem; color: rgba(255,255,255,.6);
}
.sidebar-user span { display: block; font-weight: 700; color: #fff; font-size: .88rem; margin-bottom: 2px; }
nav { flex: 1; padding: 20px 14px; display: flex; flex-direction: column; gap: 6px; }
.nav-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 13px 16px;
  border-radius: 14px;
  border: none; background: transparent;
  color: rgba(255,255,255,.75);
  font-family: inherit; font-size: .88rem; font-weight: 600;
  cursor: pointer; transition: all .18s;
  width: 100%; text-align: right;
  letter-spacing: .01em;
}
.nav-btn:hover { background: rgba(255,255,255,.13); color: #fff; }
.nav-btn.active { background: #fff; color: var(--primary); box-shadow: 0 2px 12px rgba(0,0,0,.1); }
.nav-btn .icon { font-size: 1.15rem; }
.sidebar-footer {
  padding: 14px;
  border-top: 1px solid rgba(255,255,255,.1);
}
.logout-btn {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px; border-radius: 14px;
  border: none; background: transparent;
  color: rgba(255,255,255,.5);
  font-family: inherit; font-size: .84rem; font-weight: 600;
  cursor: pointer; transition: all .18s; width: 100%; text-align: right;
}
.logout-btn:hover { background: rgba(255,255,255,.1); color: #fff; }

/* ── Main content ── */
.main { margin-right: var(--sidebar-w); min-height: 100vh; padding: 32px 36px; }

/* ── Cards ── */
.card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: 0 4px 24px rgba(94,23,235,.07);
  overflow: hidden;
}
.card-header {
  padding: 22px 28px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 1rem; font-weight: 700; color: var(--text); }

/* ── Buttons ── */
.btn { display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 22px; border-radius: 50px; border: none;
  font-family: inherit; font-size: .84rem; font-weight: 700;
  cursor: pointer; transition: all .18s; letter-spacing: .01em; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dark); box-shadow: 0 4px 16px rgba(94,23,235,.3); }
.btn-accent { background: var(--accent); color: #fff; }
.btn-accent:hover { filter: brightness(1.06); box-shadow: 0 4px 16px rgba(255,102,196,.3); }
.btn-outline { background: transparent; color: var(--primary);
  border: 2px solid var(--primary); }
.btn-outline:hover { background: var(--primary-soft); }
.btn-ghost { background: transparent; color: var(--text-muted);
  border: 1.5px solid var(--border); }
.btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
.btn-sm { padding: 7px 16px; font-size: .78rem; }
.btn-danger { background: transparent; color: #e0004d;
  border: 1.5px solid #ffd0e6; font-size: .78rem; border-radius: 50px; padding: 5px 12px; font-family: inherit; font-weight: 700; cursor: pointer; }
.btn-danger:hover { background: #fff0f6; }

/* ── Badges / status ── */
.badge {
  display: inline-block; padding: 3px 10px;
  border-radius: 999px; font-size: .72rem; font-weight: 700;
}
.badge-new         { background: #f0ebff; color: var(--primary); }
.badge-preparing   { background: #fff8e0; color: #c07000; }
.badge-delivery    { background: #e0f0ff; color: #005faa; }
.badge-delivered   { background: #e0fbef; color: #008043; }
.badge-done        { background: #f0f0f0; color: #666; }
.badge-cancelled   { background: #fff0f5; color: #c0006a; }
.badge-paid        { background: #e0fbef; color: #008043; }
.badge-pending-pay { background: #fff8e0; color: #c07000; }

/* ── Table ── */
table { width: 100%; border-collapse: collapse; font-size: .85rem; }
th { background: #f8f6ff; color: var(--text-muted); font-size: .72rem;
  font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
  padding: 10px 16px; text-align: right; }
td { padding: 12px 16px; border-bottom: 1px solid #f5f2fc; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #faf8ff; }

/* ── Form inputs ── */
input, select, textarea {
  font-family: inherit; border: 2px solid var(--border);
  border-radius: 12px; padding: 10px 16px; font-size: .88rem;
  color: var(--text); outline: none; transition: border-color .18s;
  background: #fff;
}
input:focus, select:focus, textarea:focus { border-color: var(--primary); }
input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--primary); }
input[type=time] { direction: ltr; }

/* ── Toggle switch ── */
.toggle {
  display: inline-flex; align-items: center;
  width: 42px; height: 24px; border-radius: 999px;
  border: none; cursor: pointer; transition: background .2s; position: relative;
  flex-shrink: 0;
}
.toggle.on  { background: #22c55e; }
.toggle.off { background: #d1d5db; }
.toggle-dot {
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; position: absolute;
  top: 3px; transition: right .2s;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
.toggle.on  .toggle-dot { right: 3px; }
.toggle.off .toggle-dot { right: 21px; }

/* ── Stat cards ── */
.stat-card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: 0 4px 24px rgba(94,23,235,.07);
  padding: 24px 26px;
}
.stat-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); line-height: 1; }
.stat-label { font-size: .75rem; color: var(--text-muted); margin-top: 4px; font-weight: 600; }
.stat-card.accent .stat-value { color: var(--accent); }
.stat-card.green  .stat-value { color: #16a34a; }
.stat-card.violet .stat-value { color: var(--primary); }

/* ── Page header ── */
.page-header { margin-bottom: 22px; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 1.4rem; font-weight: 800; color: var(--text); }

/* ── Category blocks ── */
.cat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 24px; background: var(--primary-soft);
  border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .15s;
}
.cat-header:hover { background: #e2d6fa; }

/* ── Product row ── */
.product-row {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 24px; border-bottom: 1px solid #f4f1fb;
  transition: background .12s;
}
.product-row:hover { background: #faf8ff; }
.product-row:last-child { border-bottom: none; }

/* ── Modals ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(20,0,48,.4);
  z-index: 50; display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 24px;
  box-shadow: 0 24px 80px rgba(94,23,235,.2);
  width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 22px 28px; border-bottom: 1px solid var(--border);
}
.modal-title { font-size: 1.05rem; font-weight: 700; color: var(--text); }
.modal-close { font-size: 1.4rem; line-height: 1; color: var(--text-muted);
  cursor: pointer; background: var(--bg); border: none; padding: 4px 8px;
  border-radius: 8px; transition: background .15s; }
.modal-close:hover { background: var(--border); }
.modal-body { padding: 26px 28px; }
.modal-body .form-group { margin-bottom: 18px; }
.modal-body label { display: block; font-size: .8rem; font-weight: 600;
  color: var(--text-muted); margin-bottom: 7px; text-transform: uppercase; letter-spacing: .04em; }
.modal-body input, .modal-body select, .modal-body textarea { width: 100%; }
.modal-footer {
  display: flex; gap: 12px; padding: 18px 28px;
  border-top: 1px solid var(--border); background: #faf8ff; border-radius: 0 0 24px 24px;
}
.modal-footer .btn { flex: 1; justify-content: center; }

/* ── Select in filters ── */
.filter-select {
  padding: 8px 14px; border-radius: 10px;
  border: 2px solid var(--border); font-family: inherit;
  font-size: .85rem; color: var(--text); background: #fff;
  outline: none; cursor: pointer;
}
.filter-select:focus { border-color: var(--primary); }

/* ── Misc ── */
.empty-state { padding: 48px; text-align: center; color: var(--text-muted); font-size: .9rem; }
.divider { height: 1px; background: var(--border); margin: 8px 0; }

/* ── Settings toggle row ── */
.setting-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.setting-row:last-child { border-bottom: none; }
.setting-row label { font-size: .9rem; font-weight: 600; color: var(--text); }

/* ── IMG thumb ── */
.img-thumb {
  width: 36px; height: 36px; border-radius: 8px; object-fit: cover;
  border: 2px solid var(--border);
}

/* ── Additions table ── */
.additions-table { margin: 0 16px 14px; border: 1.5px solid #e8e2f8;
  border-radius: 10px; overflow: hidden; font-size: .8rem; }
.additions-table th { background: #f5f0ff; color: var(--primary);
  font-size: .72rem; padding: 8px 12px; }
.additions-table td { padding: 9px 12px; border-bottom: 1px solid #f0ebff; }
.additions-table tr:last-child td { border-bottom: none; }

/* ── Hours grid ── */
.hours-grid { display: grid; gap: 8px; }
.hours-row {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 12px; background: #faf8ff; border-radius: 10px;
}
.hours-day { font-size: .82rem; font-weight: 700; color: var(--primary); width: 60px; }
</style>
</head>
<body>

<!-- ── Sidebar ── -->
<aside id="sidebar">
  <div class="sidebar-logo">
    <img src="/jas-3.png" alt="Jasell"
      onerror="this.style.display='none';document.querySelector('.logo-fallback').style.display='block'">
    <div class="logo-fallback">Jasell</div>
    <div class="logo-sub">ממשק ניהול</div>
  </div>
  <div class="sidebar-user">
    <span id="userDisplayName">—</span>
    <span id="userRole" style="color:rgba(255,255,255,.5);font-size:.72rem"></span>
  </div>
  <nav>
    <button onclick="showTab('orders')"   id="tab-orders"    class="nav-btn active">
      <span class="icon">📋</span> הזמנות
    </button>
    <button onclick="showTab('products')" id="tab-products"  class="nav-btn admin-only" style="display:none">
      <span class="icon">🍕</span> מוצרים
    </button>
    <button onclick="showTab('customers')" id="tab-customers" class="nav-btn admin-only" style="display:none">
      <span class="icon">👥</span> לקוחות
    </button>
    <button onclick="showTab('settings')" id="tab-settings"  class="nav-btn admin-only" style="display:none">
      <span class="icon">⚙️</span> הגדרות
    </button>
  </nav>
  <div class="sidebar-footer">
    <button onclick="logout()" class="logout-btn">
      <span>🚪</span> יציאה
    </button>
  </div>
</aside>

<!-- ── Main ── -->
<div class="main">

  <!-- ORDERS -->
  <div id="page-orders" style="display:none">
    <div id="statsSection" class="admin-only" style="display:none; margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div class="page-title">סטטיסטיקות</div>
        <input type="date" id="statsDate" style="padding:7px 12px;border-radius:10px;border:2px solid var(--border);font-family:inherit;font-size:.82rem">
      </div>
      <div id="statsCards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px"></div>
    </div>

    <div class="page-header">
      <div class="page-title">הזמנות</div>
      <div style="display:flex;gap:10px;align-items:center">
        <select id="orderStatusFilter" class="filter-select">
          <option value="all">כל הסטטוסים</option>
          <option value="new" selected>חדשות</option>
          <option value="preparing">בהכנה</option>
          <option value="out_for_delivery">בדרך</option>
          <option value="delivered">נמסרו</option>
          <option value="done">הסתיימו</option>
          <option value="cancelled">בוטלו</option>
        </select>
        <button onclick="loadOrders()" class="btn btn-primary btn-sm">רענן</button>
      </div>
    </div>
    <div id="ordersTable" class="card"></div>
  </div>

  <!-- PRODUCTS -->
  <div id="page-products" style="display:none">
    <div class="page-header">
      <div class="page-title">מוצרים</div>
      <div style="display:flex;gap:10px">
        <button onclick="openCategoryModal()" class="btn btn-outline btn-sm">+ קטגוריה</button>
        <button onclick="openProductModal()" class="btn btn-primary btn-sm">+ מוצר</button>
      </div>
    </div>
    <div id="productsTable" class="card"></div>
  </div>

  <!-- CUSTOMERS -->
  <div id="page-customers" style="display:none">
    <div class="page-header">
      <div class="page-title">לקוחות</div>
      <div style="display:flex;gap:12px;align-items:center">
        <label style="display:flex;align-items:center;gap:8px;font-size:.85rem;font-weight:600;cursor:pointer">
          <input type="checkbox" id="returningOnly" onchange="loadCustomers()"> לקוחות חוזרים בלבד
        </label>
        <button onclick="openBroadcastModal()" class="btn btn-accent btn-sm">📤 שלח הודעה</button>
      </div>
    </div>
    <div id="customersTable" class="card"></div>
  </div>

  <!-- SETTINGS -->
  <div id="page-settings" style="display:none">
    <div class="page-header"><div class="page-title">הגדרות</div></div>
    <div id="settingsForm" style="display:flex;flex-direction:column;gap:18px"></div>
  </div>

</div>

<!-- ── Order Detail Modal ── -->
<div id="orderModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="orderModalTitle">פרטי הזמנה</div>
      <button onclick="closeModal('orderModal')" class="modal-close">&times;</button>
    </div>
    <div class="modal-body" id="orderModalContent"></div>
  </div>
</div>

<!-- ── Category Modal ── -->
<div id="categoryModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="categoryModalTitle">קטגוריה חדשה</div>
      <button onclick="closeModal('categoryModal')" class="modal-close">&times;</button>
    </div>
    <form id="categoryForm">
      <div class="modal-body">
        <input type="hidden" id="categoryId">
        <div style="display:grid;grid-template-columns:56px 1fr;gap:12px;margin-bottom:16px">
          <div class="form-group" style="margin:0">
            <label>אמוג׳י</label>
            <input type="text" id="categoryEmoji" maxlength="4" style="text-align:center;font-size:1.4rem;padding:8px" placeholder="🍕">
          </div>
          <div class="form-group" style="margin:0">
            <label>שם הקטגוריה</label>
            <input type="text" id="categoryNameHe" required placeholder="פיצות">
          </div>
        </div>
        <div class="form-group">
          <label>שם באנגלית</label>
          <input type="text" id="categoryNameEn" dir="ltr" placeholder="Pizzas">
        </div>
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:.88rem;font-weight:600">
          <input type="checkbox" id="categoryHasToppings">
          קטגוריה זו תומכת בתוספות (לדוגמה: פיצות)
        </label>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeModal('categoryModal')" class="btn btn-ghost">ביטול</button>
        <button type="submit" class="btn btn-primary">שמור</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Product Modal ── -->
<div id="productModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="productModalTitle">מוצר חדש</div>
      <button onclick="closeModal('productModal')" class="modal-close">&times;</button>
    </div>
    <form id="productForm">
      <div class="modal-body">
        <input type="hidden" id="productId">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>שם (עברית)</label>
            <input type="text" id="productNameHe" required>
          </div>
          <div class="form-group">
            <label>שם (אנגלית)</label>
            <input type="text" id="productNameEn" dir="ltr">
          </div>
        </div>
        <div class="form-group">
          <label>מחיר (₪)</label>
          <input type="number" id="productPrice" step="0.1" min="0" required>
        </div>
        <div class="form-group">
          <label>קישור תמונה (URL)</label>
          <input type="url" id="productImageUrl" dir="ltr" placeholder="https://...">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeModal('productModal')" class="btn btn-ghost">ביטול</button>
        <button type="submit" class="btn btn-primary">שמור</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Addition Modal ── -->
<div id="additionModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="additionModalTitle">תוספת חדשה</div>
      <button onclick="closeModal('additionModal')" class="modal-close">&times;</button>
    </div>
    <form id="additionForm">
      <div class="modal-body">
        <input type="hidden" id="additionId">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label>שם (עברית)</label>
            <input type="text" id="additionNameHe" required>
          </div>
          <div class="form-group">
            <label>שם (אנגלית)</label>
            <input type="text" id="additionNameEn" dir="ltr">
          </div>
        </div>
        <div class="form-group">
          <label>מחיר (₪)</label>
          <input type="number" id="additionPrice" step="0.1" min="0" required>
        </div>
        <div class="form-group">
          <label>קישור תמונה (URL)</label>
          <input type="url" id="additionImageUrl" dir="ltr" placeholder="https://...">
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" onclick="closeModal('additionModal')" class="btn btn-ghost">ביטול</button>
        <button type="submit" class="btn btn-primary">שמור</button>
      </div>
    </form>
  </div>
</div>

<!-- ── Broadcast Modal ── -->
<div id="broadcastModal" class="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">שליחת הודעת WhatsApp</div>
      <button onclick="closeModal('broadcastModal')" class="modal-close">&times;</button>
    </div>
    <div class="modal-body">
      <div style="background:#fff0f9;border:1.5px solid #ff66c4;border-radius:10px;padding:12px 14px;font-size:.82rem;color:#a0006a;margin-bottom:14px">
        ⚠️ שליחת הודעות ללא יזימת לקוח עלולה לגרום לחסימה. מומלץ עד 50 נמענים.
      </div>
      <div id="broadcastRecipients" style="font-size:.85rem;color:var(--text-muted);margin-bottom:10px"></div>
      <textarea id="broadcastMessage" rows="4" dir="rtl"
        style="width:100%;border-radius:10px" placeholder="כתוב הודעה..."></textarea>
    </div>
    <div class="modal-footer">
      <button onclick="closeModal('broadcastModal')" class="btn btn-ghost">ביטול</button>
      <button onclick="sendBroadcast()" class="btn btn-accent">שלח</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
