<!doctype html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>חלון מטבח — Jasell</title>
<link rel="stylesheet" href="tokens.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: var(--color-bg, #f5f5f5);
  color: var(--color-text, #1a1a1a);
  min-height: 100vh;
}

/* ── Header ── */
.header {
  background: #1a1a2e;
  color: #fff;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header-title { font-size: 1.1rem; font-weight: 700; letter-spacing: .3px; }
.header-right { display: flex; align-items: center; gap: 12px; }
.status-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #ef4444;
  transition: background .3s;
}
.status-dot.connected { background: #22c55e; }
.status-label { font-size: .78rem; color: #a0aec0; }

/* ── Columns ── */
.board {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  padding: 16px;
  max-width: 1200px;
  margin: 0 auto;
}
@media (max-width: 768px) {
  .board { grid-template-columns: 1fr; }
}

.column {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.column-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: 12px;
  font-weight: 700;
  font-size: .85rem;
}
.col-new     .column-header { background: #fef3c7; color: #92400e; }
.col-prep    .column-header { background: #dbeafe; color: #1e40af; }
.col-ready   .column-header { background: #dcfce7; color: #166534; }

.col-badge {
  margin-right: auto;
  background: rgba(0,0,0,.12);
  border-radius: 999px;
  padding: 1px 8px;
  font-size: .75rem;
}

/* ── Order card ── */
.order-card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,.07);
  padding: 16px;
  border-top: 4px solid transparent;
  animation: slideIn .25s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.col-new   .order-card { border-top-color: #f59e0b; }
.col-prep  .order-card { border-top-color: #3b82f6; }
.col-ready .order-card { border-top-color: #22c55e; }

.card-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.card-num {
  font-weight: 800;
  font-size: 1rem;
  color: #1a1a2e;
}
.card-timer {
  font-size: .75rem;
  color: #94a3b8;
  background: #f1f5f9;
  padding: 2px 8px;
  border-radius: 999px;
}
.card-timer.urgent { color: #ef4444; background: #fee2e2; }

.card-method {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: .74rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 999px;
  margin-bottom: 10px;
}
.method-delivery { background: #ede9fe; color: #5b21b6; }
.method-pickup   { background: #fce7f3; color: #9d174d; }

.card-items {
  list-style: none;
  font-size: .85rem;
  line-height: 1.6;
  margin-bottom: 10px;
  color: #374151;
}
.card-items li { padding: 3px 0; border-bottom: 1px dashed #f1f5f9; }
.card-items li:last-child { border-bottom: none; }
.item-qty { font-weight: 700; color: #1a1a2e; margin-left: 4px; }
.item-toppings { font-size: .77rem; color: #6b7280; margin-right: 8px; }

.card-notes {
  font-size: .8rem;
  background: #fffbeb;
  border-radius: 8px;
  padding: 6px 10px;
  color: #78350f;
  margin-bottom: 10px;
}

.card-actions { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-action {
  flex: 1;
  padding: 9px 12px;
  border: none;
  border-radius: 10px;
  font-size: .82rem;
  font-weight: 700;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
}
.btn-action:hover { opacity: .88; }
.btn-action:active { transform: scale(.97); }
.btn-action:disabled { opacity: .45; cursor: not-allowed; }

.btn-prep  { background: #3b82f6; color: #fff; }
.btn-ready { background: #22c55e; color: #fff; }

/* ── Empty state ── */
.empty {
  text-align: center;
  padding: 32px 16px;
  color: #94a3b8;
  font-size: .85rem;
}

/* ── Toast ── */
#toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #1a1a2e;
  color: #fff;
  padding: 10px 22px;
  border-radius: 999px;
  font-size: .85rem;
  font-weight: 600;
  pointer-events: none;
  opacity: 0;
  transition: opacity .2s;
  z-index: 100;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">🍕 חלון מטבח</div>
  <div class="header-right">
    <span class="status-dot" id="dot"></span>
    <span class="status-label" id="connLabel">מתחבר…</span>
    <button onclick="logout()" style="background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:.8rem">יציאה</button>
  </div>
</div>

<div class="board">
  <div class="column col-new">
    <div class="column-header">⏰ ממתין להכנה <span class="col-badge" id="badge-new">0</span></div>
    <div id="col-new"></div>
  </div>
  <div class="column col-prep">
    <div class="column-header">🔥 בהכנה <span class="col-badge" id="badge-preparing">0</span></div>
    <div id="col-preparing"></div>
  </div>
  <div class="column col-ready">
    <div class="column-header">✅ מוכן <span class="col-badge" id="badge-ready">0</span></div>
    <div id="col-ready"></div>
  </div>
</div>

<div id="toast"></div>

<script src="kitchen.js"></script>
</body>
</html>
