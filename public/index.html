<!doctype html>
<html dir="rtl" lang="he">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jasell — כניסה</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #5e17eb;
    --accent:  #ff66c4;
    --bg:      #eeede9;
    --white:   #ffffff;
  }
  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: var(--white);
    border-radius: 24px;
    box-shadow: 0 8px 40px rgba(94,23,235,.10);
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo img { height: 72px; }
  .logo-text {
    font-size: 2rem;
    font-weight: 800;
    color: var(--primary);
    letter-spacing: -1px;
  }
  .logo-sub {
    font-size: .85rem;
    color: #9b93b0;
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: .85rem;
    font-weight: 700;
    color: #3d3352;
    margin-bottom: 6px;
  }
  input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e8e4f5;
    border-radius: 12px;
    font-family: inherit;
    font-size: .95rem;
    color: #1a1028;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 18px;
    text-align: right;
    direction: ltr;
  }
  input:focus { border-color: var(--primary); }
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    margin-top: 4px;
  }
  .btn:hover { opacity: .92; }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .error {
    display: none;
    background: #fff0f6;
    border: 1.5px solid #ff66c4;
    color: #c0006a;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: .85rem;
    margin-bottom: 14px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/jas-3.png" alt="Jasell" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
    <div class="logo-text" style="display:none">Jasell</div>
    <div class="logo-sub">ממשק ניהול</div>
  </div>

  <form id="loginForm">
    <label>שם משתמש</label>
    <input type="text" id="username" required autocomplete="username" placeholder="admin / manager" dir="ltr">
    <label>סיסמא</label>
    <input type="password" id="password" required autocomplete="current-password">
    <div class="error" id="errorMsg"></div>
    <button type="submit" class="btn" id="submitBtn">כניסה</button>
  </form>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errorMsg = document.getElementById('errorMsg');
  const btn = document.getElementById('submitBtn');

  btn.disabled = true;
  btn.textContent = 'מתחבר...';
  errorMsg.style.display = 'none';

  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'שגיאת כניסה');
    localStorage.setItem('token', data.token);
    localStorage.setItem('role', data.role);
    localStorage.setItem('username', data.username);
    window.location.href = '/dashboard.html';
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'כניסה';
  }
});
</script>
</body>
</html>
